[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.extract]
  external_node_modules = ["pdf-parse", "mammoth"]

[functions.study]
  timeout = 26

[functions.study-status]
  timeout = 10

[[redirects]]
  from = "/"
  to = "/app.html"
  status = 301
  force = true

[functions.create-checkout]
  timeout = 10

[functions.stripe-webhook]
  timeout = 10

[functions.set-trial]
  timeout = 10

[functions.grade]
  timeout = 26

[functions.ai-check]
  timeout = 26

[[redirects]]
  from = "/"
  to = "/app.html"
  status = 301
  force = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "POST, OPTIONS"
